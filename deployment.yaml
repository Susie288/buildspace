apiVersion: apps/v1
kind: Deployment

metadata:
  name: buildspace-sample

spec:
  replicas: 2

  selector:
    matchLabels:
      app: buildspace-sample

  template:
    metadata:
      labels:
        app: buildspace-sample

    spec:
      containers:
        - name: buildspace
          image: buildspace
          imagePullPolicy: Never
          ports:
            - containerPort: 80